version: "3.9"

services:
  # ── Backend API ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riesgo-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://riesgo:riesgo123@db:5432/riesgo_antioquia
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: riesgo-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

  # ── Base de datos PostgreSQL + PostGIS ────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: riesgo-db
    environment:
      POSTGRES_DB: riesgo_antioquia
      POSTGRES_USER: riesgo
      POSTGRES_PASSWORD: riesgo123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # ── Redis (cache + pub/sub alertas) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: riesgo-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: riesgo-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
